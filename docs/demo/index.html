<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>analyze-stock-kpi · demo dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js" defer></script>
  <script src="vendor/fuse.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <h1>
      <a href="https://github.com/qte77/analyze-stock-kpi">analyze-stock-kpi</a>
      · KPI demo dashboard
    </h1>
    <span id="updated" class="updated"></span>
  </header>

  <main>
    <section id="fear-greed-section">
      <h2>CNN Fear &amp; Greed · 2-Year History</h2>
      <div id="fg-header">
        <div id="fg-score">—</div>
        <div id="fg-meta">
          <span id="fg-rating" class="chip">loading…</span>
          <span id="fg-deltas"></span>
        </div>
      </div>
      <div id="fg-chart-wrap">
        <canvas id="fg-chart"></canvas>
      </div>
    </section>

    <section id="universe-section">
      <div id="universe-header">
        <h2>
          Universe ·
          <span id="universe-name">qte77-watchlist</span>
          ·
          <span id="universe-size">— tickers</span>
        </h2>
        <label>
          Snapshot:
          <select id="date-selector"></select>
        </label>
        <input
          id="universe-filter"
          type="search"
          placeholder="Filter ticker / name / sector…"
          aria-label="Filter universe by ticker, name, or sector"
        />
      </div>
      <div class="table-wrap">
        <table id="universe-table">
          <thead>
            <tr>
              <th data-key="symbol" title="Yahoo Finance symbol">Ticker</th>
              <th data-key="long_name" title="Long company or asset name">Name</th>
              <th data-key="sector" title="GICS sector (Technology, Healthcare, etc.)">Sector</th>
              <th data-key="forward_pe" class="num" title="Forward P/E: price / next-12mo EPS estimate. Lower = cheaper relative to expected earnings.">P/E (fwd)</th>
              <th data-key="trailing_peg_ratio" class="num" title="Trailing PEG ratio: P/E adjusted for historical earnings growth. Lower is better; <1 is the classic Peter Lynch &quot;undervalued&quot; threshold.">PEG</th>
              <th data-key="beta" class="num" title="5y beta vs market. <1 = less volatile than market; lower = less systematic risk.">Beta</th>
              <th data-key="rd_to_revenue" class="num" title="R&amp;D expense as share of revenue. EQUITY-only (null for ETFs / FX / futures / crypto).">R&amp;D/Rev %</th>
              <th data-key="operating_margins" class="num" title="Operating margin: operating income / revenue. Pre-tax and pre-interest — comparable across countries.">Op M %</th>
              <th data-key="return_on_equity" class="num" title="Return on equity: net income / shareholder equity. Profitability per equity dollar (sensitive to leverage).">ROE %</th>
              <th data-key="return_on_assets" class="num" title="Return on assets: net income / total assets. Leverage-neutral profitability per asset dollar.">ROA %</th>
              <th data-key="current_ratio" class="num" title="Current ratio: current assets / current liabilities. Short-term liquidity (>1 means assets cover liabilities).">Current</th>
              <th data-key="sortino_ratio" class="num" title="Annualized Sortino ratio over 1y (rf=0). Higher = better upside vs downside skew.">Sortino</th>
              <th data-key="composite_scores.screener_score" class="num" title="Composite of the 9 visible KPI columns (0-100). Higher = better. Default sort descending.">Score</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <aside id="row-detail" hidden></aside>
    </section>
  </main>

  <footer>
    Powered by
    <a href="https://github.com/ranaroussi/yfinance">yfinance</a> +
    <a href="https://edition.cnn.com/markets/fear-and-greed">CNN F&amp;G</a>
    · source:
    <a href="https://github.com/qte77/analyze-stock-kpi">qte77/analyze-stock-kpi</a>
  </footer>
</body>
</html>
