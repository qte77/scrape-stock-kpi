---
name: tag-release

# Watches main for pyproject.toml version changes (typically the
# squash-merge of a bump-my-version release PR) and creates the
# annotated `v$NEW` tag against the actual main commit. Pairs with
# `bump-my-version.yaml`, which now runs with `--no-tag` so the tag
# is always reachable from main rather than orphaned on a
# feature-branch commit that the squash discards.

on:
  push:
    branches: [main]
    paths: [pyproject.toml]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 2  # HEAD + parent so we can diff the version line

      - name: Detect version bump
        id: detect
        run: |
          set -euo pipefail
          NEW=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          OLD=$(git show HEAD^:pyproject.toml | grep -m1 '^version = ' | sed -E 's/version = "(.*)"/\1/')
          if [ "$NEW" = "$OLD" ]; then
            echo "no version change ($OLD == $NEW); nothing to tag"
            exit 0
          fi
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "bumped=true" >> "$GITHUB_OUTPUT"

      - name: Create + push annotated tag
        if: steps.detect.outputs.bumped == 'true'
        env:
          NEW: ${{ steps.detect.outputs.new }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/v$NEW" >/dev/null; then
            echo "tag v$NEW already exists at $(git rev-parse "v$NEW"); aborting"
            exit 1
          fi
          git config user.email "release-tag@qte77.gha"
          git config user.name "tag-release"
          git tag -a -m "Release v$NEW" "v$NEW"
          git push origin "v$NEW"
