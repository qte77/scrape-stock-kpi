---
# Demo dashboard deploy to GitHub Pages (#59).
#
# Modern Pages source = "GitHub Actions" (Settings -> Pages -> Source).
# Workflow assembles docs/demo/* into _site/ and deploys via
# actions/upload-pages-artifact + actions/deploy-pages. No gh-pages
# branch.
#
# Data files (results/cnn_fg/YYYY.json, results/demo/<UNIVERSE>/*.json)
# are NOT bundled into the artifact. The page fetches them at runtime
# from raw.githubusercontent.com on the `data` branch, where the
# fear-greed.yaml and demo-snapshot.yml workflows commit verified
# updates. This decouples data-update cadence from page deploys —
# this workflow runs only when docs/demo/* or this workflow itself
# changes.

name: gh-pages

on:
  push:
    branches: [main]
    paths:
      - "docs/demo/**"
      - ".github/workflows/gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: assemble + deploy docs/demo to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Assemble _site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r docs/demo/. _site/

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
