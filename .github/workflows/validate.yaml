---
name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: lint + types + complexity + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev + test dependencies
        run: uv sync --group dev --group test

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pyright type check
        run: uv run pyright src

      - name: Complexipy cognitive complexity (max 15)
        run: uv run complexipy src --max-complexity-allowed 15

      - name: Markdownlint
        run: npx --yes markdownlint-cli --config .markdownlint.json '**/*.md' --ignore '.venv/**' --ignore 'results/**' --ignore 'node_modules/**'

      - name: Lint JS (node --check + tsc JSDoc type check)
        run: |
          node --check docs/demo/app.js
          npx --yes -p typescript@5 tsc --noEmit --project docs/demo

      - name: Pytest with coverage
        run: uv run pytest --cov=src --cov-fail-under=0
