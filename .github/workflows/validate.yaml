---
name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: lint + types + complexity + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev + test dependencies
        run: uv sync --group dev --group test

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pyright type check
        run: uv run pyright app

      - name: Complexipy cognitive complexity (max 15)
        run: uv run complexipy app --max-complexity-allowed 15

      - name: Markdownlint
        run: npx --yes markdownlint-cli --config .markdownlint.json '**/*.md' --ignore '.venv/**' --ignore 'results/**' --ignore 'node_modules/**'

      - name: Pytest with coverage
        run: uv run pytest --cov=app --cov-fail-under=0
