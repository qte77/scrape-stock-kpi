---
name: bump-my-version

# Manually-triggered version bump. Invokes the `bump-my-version` CLI
# directly (the package is already a dev dep — see
# [dependency-groups].dev in pyproject.toml) rather than the
# `callowayproject/bump-my-version` composite action, which transitively
# uses tag-pinned subactions that the repo's "Require actions to be
# pinned to a full-length commit SHA" rule rejects.
#
# Behavior: bumps pyproject.toml + README badge + CHANGELOG per
# [tool.bumpversion] config, pushes a `bump-<run>-<base>` branch, and
# opens a PR for review. Tagging is intentionally deferred to
# `tag-release.yaml`, which fires on push-to-main and tags the
# squash-merge commit on `main` so the `v{new}` ref always points to
# a commit that is reachable from `main` (the historical "tag drift"
# from squash-merging the bump-branch commit is structurally
# impossible under this split).

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Semver part to bump"
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write
  pull-requests: write

env:
  BRANCH_NEW: bump-${{ github.run_number }}-${{ github.ref_name }}

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python + install dev deps (bump-my-version)
        run: |
          uv python install 3.12
          uv sync --group dev

      - name: Configure git + branch
        env:
          BRANCH: ${{ env.BRANCH_NEW }}
        run: |
          git config user.email "bumped@qte77.gha"
          git config user.name "bump-my-version"
          git checkout -b "$BRANCH"

      - name: Run bump-my-version
        id: bump
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          set -euo pipefail
          PREV_VERSION=$(uv run bump-my-version show current_version)
          # --no-tag: tag-release.yaml creates the annotated tag against
          # main's squash-merge commit, not this feature branch's commit,
          # so the tag is always reachable from main.
          uv run bump-my-version bump --no-tag "$BUMP_TYPE"
          NEW_VERSION=$(uv run bump-my-version show current_version)
          echo "prev_version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bumped=true" >> "$GITHUB_OUTPUT"

      - name: Push branch
        if: steps.bump.outputs.bumped == 'true'
        env:
          BRANCH: ${{ env.BRANCH_NEW }}
        run: |
          git push origin "HEAD:refs/heads/$BRANCH"

      - name: Open release PR
        if: steps.bump.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.ref_name }}
          HEAD_BRANCH: ${{ env.BRANCH_NEW }}
          PREV_VERSION: ${{ steps.bump.outputs.prev_version }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$HEAD_BRANCH" \
            --title "chore(release): bump $PREV_VERSION -> $NEW_VERSION" \
            --body "Automated bump via bump-my-version.yaml workflow_dispatch. Updates pyproject.toml, README version badge, and CHANGELOG.md. The \`v$NEW_VERSION\` tag is created automatically by \`tag-release.yaml\` after this PR is squash-merged to main, so the tag always points at the merge commit."
